apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keel
rules:
  - apiGroups:
      - '' # core API group
    resources:
      - secrets
    verbs:
      - watch
      - list
      - get
  - apiGroups:
      - '' # core API group
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - watch
      - list
      - get
      - update
      - patch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
