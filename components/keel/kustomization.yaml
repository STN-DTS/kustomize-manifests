apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Labels applied to all resources generated by this kustomization.
# Standard Kubernetes labels (app.kubernetes.io/*) are used for consistency
# and help identify resources in dashboards, Prometheus selectors, and Kubernetes tools.
labels:
  - pairs:
      app.kubernetes.io/name: keel
      app.kubernetes.io/component: controller
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/version: 0.21.1

resources:
  - ./keel-deployment.yaml       # Keel Deployment
  - ./keel-role.yaml             # RBAC Role for Keel
  - ./keel-role-binding.yaml     # RBAC RoleBinding for Keel
  - ./keel-service-account.yaml  # ServiceAccount for Keel
